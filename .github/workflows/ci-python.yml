name: Python CI (WebRTC Engineering — tools)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install dependencies with uv
      run: |
        uv sync
    - name: Lint with isort (check only)
      run: uv run isort --check-only --diff tools/pyscripts/
    - name: Lint with black (check only)
      run: uv run black --check --line-length 127 --target-version py312 tools/pyscripts/
    - name: Lint with flake8
      run: |
        uv run flake8 tools/pyscripts/ --count --select=E9,F63,F7,F82 --show-source --statistics
        uv run flake8 tools/pyscripts/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
