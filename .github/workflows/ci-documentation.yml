name: Documentation Quality (Markdown & Links)

on:
  push:
    branches: [main, master, 'swamy/**']
    paths:
      - '**.md'
      - 'lychee.toml'
      - '.markdownlint*.json'
      - '.markdownlint*.yaml'
      - '.github/workflows/ci-documentation.yml'
  pull_request:
    branches: [main, master]
    paths:
      - '**.md'
      - 'lychee.toml'
      - '.markdownlint*.json'
      - '.markdownlint*.yaml'
      - '.github/workflows/ci-documentation.yml'
  workflow_dispatch: # Allow manual trigger

jobs:
  markdown-lint:
    name: Markdown Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Markdown linting
        run: |
          # Use markdownlint-cli2 with repo config (.markdownlint-cli2.yaml + .markdownlint.json)
          npx --yes markdownlint-cli2 \
            "README.md" \
            "docs/**/*.md" \
            "src/**/*.md" \
            "tools/**/*.md"

  link-checker:
    name: Link Checking (Lychee)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@v2
        with:
          # Use the existing lychee.toml configuration
          args: --config lychee.toml --cache --max-cache-age 1d '**/*.md'
          # Fail on broken links
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create lychee report artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lychee-report
          path: ./lychee/out.md
          retention-days: 7
