<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebSocket chat lab</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <h1>WebSocket chat lab</h1>
      <p class="hint">Open two tabs on <code>localhost</code> to see messages relay instantly.</p>
      <label>
        Display name
        <input id="user" type="text" placeholder="me" autocomplete="username" />
      </label>
      <ul id="messages" aria-live="polite"></ul>
      <form id="form">
        <input id="text" type="text" placeholder="Type a message…" autocomplete="off" required />
        <button type="submit">Send</button>
      </form>
    </main>
    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js" type="module"></script>
  </body>
</html>
